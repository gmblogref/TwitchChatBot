<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Twitch Alert Overlay</title>
    <link rel="stylesheet" href="stylealerts.css?v=2" />
</head>
<body>
    <div id="alert"></div>
    <div id="media"></div>

    <script>
        const alertBox = document.getElementById("alert");
        const mediaBox = document.getElementById("media");
        let playing = false;
        let ws;
        let currentAlertId = null;
        let pending = null;

        function connectWebSocket() {
            ws = new WebSocket(`ws://${location.hostname}:3000/ws`);

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                // Ping/pong to keep connection alive (server sends pings every 30s)
                if (data.type === "ping") {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: "pong" }));
                    }
                    return;
                }

                // Only handle normal alerts here
                if (data.type !== "alert") return;

                if (playing) {
                    pending = data;
                    return;
                }

                startAlert(data);
            };

            ws.onopen = () => {
                if (pending && !playing) {
                    const next = pending;
                    pending = null;
                    startAlert(next);
                }
            };

            ws.onclose = () => {
                playing = false;
                pending = null;
                currentAlertId = null;
                setTimeout(connectWebSocket, 3000);  // auto-reconnect
            };
        }

		function startAlert(data) {
			currentAlertId = data.alertId || null;

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                pending = data;
                return;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "ack", alertId: currentAlertId }));
            }

            playAlert(data);
        }

        function waitForEndOrTimeout(mediaEl, timeoutMs) {
            return new Promise(resolve => {
                let done = false;

                const finish = () => {
                    if (done) return;
                    done = true;
                    cleanup();
                    resolve();
                };

                const cleanup = () => {
                    mediaEl.onended = null;
                    mediaEl.onerror = null;
                };

                mediaEl.onended = finish;
                mediaEl.onerror = finish;

                setTimeout(finish, timeoutMs);
            });
        }

        connectWebSocket();

		async function playAlert(data) {
			console.log("PLAY ALERT:", data);

			playing = true;

			const message = data.message;
			const media = data.mediapath;

			// Hide alert text initially
			alertBox.innerHTML = "";
			alertBox.style.opacity = 0;

			mediaBox.innerHTML = "";

			// --- PLAY MEDIA FIRST ---
			if (media?.endsWith(".mp4")) {
				const video = document.createElement("video");
				video.src = media;
				video.autoplay = true;
				video.playsInline = true;
				video.muted = false;
				video.volume = 1.0;

				mediaBox.appendChild(video);

				await video.play().catch(() => null);
				await waitForEndOrTimeout(video, 30000);

			} else if (media?.endsWith(".gif")) {
				const img = document.createElement("img");
				img.src = media;
				mediaBox.appendChild(img);

				await sleep(5000);

			} else if (media?.endsWith(".mp3")) {
				const audio = new Audio(media);
				audio.volume = 1.0;

				await audio.play().catch(() => null);
				await waitForEndOrTimeout(audio, 30000);
			} else {
				await sleep(5000);
			}

			// --- NOW SHOW RAID INFO (ICON + TEXT) ---
			if (data.extraData?.profileImage || message) {
				const container = document.createElement("div");
				container.className = "alert-container";

				if (data.extraData?.profileImage) {
					const img = document.createElement("img");
					img.src = data.extraData.profileImage;
					img.className = "raid-profile";
					container.appendChild(img);
				}

				const text = document.createElement("div");
				text.className = "alert-text";
				text.textContent = message || "";

				container.appendChild(text);

				alertBox.appendChild(container);
				alertBox.style.opacity = 1;

				// Keep it on screen
				await sleep(4000);
			}

			// --- CLEANUP ---
			alertBox.style.opacity = 0;
			mediaBox.innerHTML = "";
			alertBox.innerHTML = "";

			playing = false;

			// Notify server
			if (ws && ws.readyState === WebSocket.OPEN) {
				ws.send(JSON.stringify({ type: "done", alertId: currentAlertId }));
			}

			currentAlertId = null;

			if (pending) {
				const next = pending;
				pending = null;
				startAlert(next);
			}
		}

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
